<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f7fb;
        }

        .card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,.1);
        }

        .title{
            font-weight:bold;
        }

        .helptext{
            font-size:13px;
            color:gray;
        }

        ul{
            font-size:13px;
            color:gray;
        }
    </style>

</head>
<body>

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-6">

            <div class="card p-4">

                <h2 class="text-center mb-4 title">
                    Create Account
                </h2>

                <form method="POST">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button class="btn btn-primary w-100">
                        Register
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

</body>
</html>
