<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Analyzer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .upload-card{
            background:white;
            padding:40px;
            border-radius:20px;
            width:700px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .title{
            text-align:center;
            margin-bottom:30px;
        }

        .btn-analyze{
            width:100%;
            padding:12px;
            font-size:18px;
        }

    </style>
</head>
<body>

<div class="upload-card">

    <div class="title">
        <h1 class="fw-bold">📄 Resume Analyzer</h1>
        <p class="text-muted">
            Upload your resume and compare it with a job description
        </p>
    </div>

    <form method="POST" enctype="multipart/form-data" action="{% url 'resume-upload' %}">

        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">
                Resume PDF
            </label>

            <input
                type="file"
                name="file"
                class="form-control"
                required>
        </div>

        <div class="mb-3">

            <label class="form-label">
                Job Description
            </label>

            <textarea
                name="job_description"
                rows="8"
                class="form-control"
                placeholder="Paste job description here..."
                required></textarea>

        </div>

        <button
            type="submit"
            class="btn btn-primary btn-analyze">

            Analyze Resume

        </button>

    </form>

</div>

</body>
</html>
